{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Delete User</h2>
    <p>Are you sure you want to delete <strong>{{ user.username }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'users:manage_users' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
