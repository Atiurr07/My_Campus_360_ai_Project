{% extends "base.html" %}

{% block content %}
<h3>Admin:Manage Attendance</h3>
<form method="POST">{% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary">Add Record</button>
</form>

<hr>
<h5>Recent Records</h5>
<ul>
    {% for r in records %}
    <li>{{ r.date }} | Period {{ r.period }} | {{ r.course.name }} | {{ r.student.username }} - {{ r.status }}</li>
    {% endfor %}
</ul>
{% endblock %}
