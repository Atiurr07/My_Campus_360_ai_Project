{% extends "base.html" %}

{% block content %}
<h2>Sleep Log</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>

{% if sleep_entries %}
    <h3>Your Sleep Records</h3>
    <ul>
        {% for entry in sleep_entries %}
            <li>{{ entry.date }} - Slept {{ entry.hours }} hours</li>
        {% endfor %}
    </ul>
{% endif %}
{% endblock %}
